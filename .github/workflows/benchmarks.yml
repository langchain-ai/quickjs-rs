name: benchmarks

# Runs the performance benchmarks under pytest-codspeed and uploads to
# CodSpeed for regression detection. See spec/benchmarks.md §6.
#
# Mode is walltime (not simulation): simulation profiles Python + wasmtime
# dispatch but can't see QuickJS bytecode execution inside the wasm module.
# Walltime captures the full stack — what users actually experience.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  wasm:
    uses: ./.github/workflows/build-wasm.yml

  benchmarks:
    name: Run benchmarks
    needs: wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/download-artifact@v4
        with:
          name: quickjs-wasm
          path: quickjs_wasm/_resources

      - name: Install package (dev + bench extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,bench]"

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: walltime
          token: ${{ secrets.CODSPEED_TOKEN }}
          run: pytest benchmarks/ --codspeed
