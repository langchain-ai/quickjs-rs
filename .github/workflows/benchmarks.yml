name: benchmarks

# Runs the performance benchmarks under pytest-codspeed and uploads
# to CodSpeed for regression detection. See spec/benchmarks.md §6.
#
# Mode is walltime: simulation (Valgrind) can't see QuickJS bytecode
# execution inside the native extension any better than it saw it
# inside the wasm module — walltime captures the full stack, which
# is what users actually experience. Single platform (Linux x86_64)
# is intentional: cross-platform benchmark comparison isn't
# meaningful.
#
# Same venv dance as test.yml — `maturin develop` refuses to
# install outside a virtualenv, so we create .venv and export
# VIRTUAL_ENV + PATH for subsequent steps.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          key: benchmarks

      - name: Create venv
        run: python -m venv .venv

      - name: Export venv to subsequent steps
        # Shared helper with test.yml — uses pathlib for
        # host-native paths so this works the same on every runner.
        run: python .github/scripts/activate_venv.py

      - name: Install maturin, bench + dev extras
        # Needs both: `bench` for pytest-codspeed, `dev` for
        # pytest-asyncio — the async benchmarks use an async_ctx
        # fixture that only resolves when pytest-asyncio is
        # installed. Without it the 5 async-fixture benchmarks
        # error with PytestRemovedIn9Warning.
        run: |
          python -m pip install --upgrade pip
          pip install maturin
          maturin develop --release -E dev,bench

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: walltime
          token: ${{ secrets.CODSPEED_TOKEN }}
          run: pytest benchmarks/ --codspeed

      - name: Emit threaded TPS summary
        # Keep a human-readable throughput line in the job summary so
        # reviewers don't need to inspect raw benchmark tables.
        run: |
          set -euo pipefail
          LOG_FILE=/tmp/threaded-stress.log

          pytest benchmarks/test_threaded_stress.py::bench_threaded_runtime_context_isolation_tps \
            --codspeed -q -s -p no:cacheprovider | tee "$LOG_FILE"

          CONFIG_LINE="$(grep -E 'threaded_stress_config=' "$LOG_FILE" | tail -n 1 || true)"
          TPS_LINE="$(grep -E 'threaded_stress_tps=' "$LOG_FILE" | tail -n 1 || true)"
          if [ -z "$CONFIG_LINE" ]; then
            echo "Failed to capture threaded_stress_config line from benchmark output." >&2
            exit 1
          fi
          if [ -z "$TPS_LINE" ]; then
            echo "Failed to capture threaded_stress_tps line from benchmark output." >&2
            exit 1
          fi
          CONFIG_PAYLOAD="${CONFIG_LINE#threaded_stress_config=}"

          {
            echo "### Threaded Stress TPS"
            echo
            echo "- \`$TPS_LINE\`"
            echo "- Config: $CONFIG_PAYLOAD"
            echo "- Note: TPS is derived from fixed-workload benchmark runtime."
          } >> "$GITHUB_STEP_SUMMARY"
