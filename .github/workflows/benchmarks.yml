name: benchmarks

# Runs the performance benchmarks under pytest-codspeed and uploads to
# CodSpeed for regression detection. See spec/benchmarks.md §6.
#
# Mode is walltime: simulation (Valgrind) can't see QuickJS bytecode
# execution inside the native extension any better than it saw it
# inside the wasm module — walltime captures the full stack, which is
# what users actually experience. Single platform (Linux x86_64) is
# intentional: cross-platform benchmark comparison isn't meaningful.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          key: benchmarks

      - name: Install maturin and bench extras
        run: |
          python -m pip install --upgrade pip
          pip install maturin
          maturin develop --release -E bench

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: walltime
          token: ${{ secrets.CODSPEED_TOKEN }}
          run: pytest benchmarks/ --codspeed
