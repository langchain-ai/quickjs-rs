name: dependency-security

on:
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - .github/scripts/check_cargo_lock_git_sources.py
      - .github/workflows/dependency-security.yml
  push:
    branches: [main]
    paths:
      - Cargo.toml
      - Cargo.lock
      - .github/scripts/check_cargo_lock_git_sources.py
      - .github/workflows/dependency-security.yml

jobs:
  git-source-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Enforce Cargo.lock git source policy
        run: python3 .github/scripts/check_cargo_lock_git_sources.py

  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run RustSec advisory scan
        run: cargo audit --deny warnings
