name: memory-profiling

# CodSpeed-first memory signal:
# - commit-to-commit regression tracking from dedicated memory benchmarks
# - smaller periodic/manual capacity sweep for runtime/context fan-out envelopes

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  memory:
    name: Memory Profiling
    runs-on: ubuntu-latest
    outputs:
      memory_artifact_url: ${{ steps.upload_memory_artifact.outputs.artifact-url }}
    env:
      CODSPEED_TOKEN: ${{ secrets.CODSPEED_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
        with:
          key: memory-profiling

      - name: Create venv
        run: python -m venv .venv

      - name: Export venv to subsequent steps
        run: python .github/scripts/activate_venv.py

      - name: Install maturin, bench + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install maturin
          maturin develop --release -E dev,bench

      - name: CodSpeed memory regression suite
        if: ${{ env.CODSPEED_TOKEN != '' }}
        uses: CodSpeedHQ/action@93bbfdc546455345ae00c6f4e100a37838b37bcf # v4.14.0
        with:
          mode: memory
          token: ${{ env.CODSPEED_TOKEN }}
          run: pytest benchmarks/test_memory.py --codspeed --codspeed-mode memory -q

      - name: Run reduced capacity sweep matrix
        # This is intentionally smaller than the original full matrix:
        # CodSpeed handles regressions; this job tracks 1 GB planning
        # envelopes and reclamation shape over time.
        run: |
          set -euo pipefail
          python3 benchmarks/memory_experiment.py \
            --runtimes 1,2,4,8 \
            --contexts-per-runtime 1,4 \
            --memory-limit-mb 32,64 \
            --payload-mb-per-context 0,1 \
            --output-csv artifacts/memory/memory-profile.csv \
            --output-markdown artifacts/memory/memory-profile.md \
            --output-plots-dir artifacts/memory/plots \
            --output-visual-markdown artifacts/memory/memory-report.md

      - name: Upload memory artifacts
        id: upload_memory_artifact
        uses: actions/upload-artifact@v4
        with:
          name: memory-profile
          path: artifacts/memory/
          if-no-files-found: error

      - name: Build Pages preview bundle
        run: |
          set -euo pipefail
          PAGES_RUN_DIR="pages/memory/${GITHUB_RUN_ID}"
          mkdir -p "$PAGES_RUN_DIR"
          cp -R artifacts/memory/plots/. "$PAGES_RUN_DIR/"
          cp artifacts/memory/memory-profile.md "$PAGES_RUN_DIR/"
          cp artifacts/memory/memory-report.md "$PAGES_RUN_DIR/"
          cp artifacts/memory/memory-profile.csv "$PAGES_RUN_DIR/"

          cat > "$PAGES_RUN_DIR/index.html" <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>quickjs-wasm memory profiling</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 24px; line-height: 1.4; }
              h1 { margin-bottom: 8px; }
              .meta { color: #555; margin-bottom: 20px; }
              .plot { margin: 0 0 20px 0; }
              img { max-width: 100%; border: 1px solid #ddd; border-radius: 8px; }
              ul { margin-top: 6px; }
            </style>
          </head>
          <body>
            <h1>quickjs-wasm memory profiling</h1>
            <p class="meta">Workflow run artifacts and plots.</p>
            <ul>
              <li><a href="memory-profile.md">memory-profile.md</a></li>
              <li><a href="memory-report.md">memory-report.md</a></li>
              <li><a href="memory-profile.csv">memory-profile.csv</a></li>
            </ul>
            <div class="plot"><h2>RSS vs QuickJS Malloc</h2><img src="rss_vs_qjs_scatter.png" alt="RSS vs QuickJS malloc scatter plot" /></div>
            <div class="plot"><h2>Overhead Breakdown</h2><img src="overhead_stacked_top.png" alt="Overhead stacked bar chart" /></div>
            <div class="plot"><h2>Phase RSS Lines</h2><img src="phase_rss_lines_top.png" alt="Phase RSS line chart" /></div>
            <div class="plot"><h2>RSS Heatmap Slice</h2><img src="rss_heatmap_slice.png" alt="RSS heatmap slice" /></div>
          </body>
          </html>
          HTML

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Append memory summary to job summary
        run: |
          set -euo pipefail
          cat artifacts/memory/memory-profile.md >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          cat artifacts/memory/memory-report.md >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "- [Download workflow artifact](${{ steps.upload_memory_artifact.outputs.artifact-url }})" >> "$GITHUB_STEP_SUMMARY"

  deploy-pages:
    name: Deploy Pages Preview
    runs-on: ubuntu-latest
    needs: memory
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Append plot preview
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          ARTIFACT_URL: ${{ needs.memory.outputs.memory_artifact_url }}
          REPO_PRIVATE: ${{ github.event.repository.private }}
        run: |
          set -euo pipefail
          PLOT_BASE="${PAGE_URL%/}/memory/${GITHUB_RUN_ID}"
          echo "### Memory Plot Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Published plot bundle](${PLOT_BASE}/index.html)" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Download workflow artifact](${ARTIFACT_URL})" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          if [[ "$REPO_PRIVATE" == "true" ]]; then
            echo "Inline image rendering is disabled for private/internal repositories because GitHub proxies markdown images through camo without auth." >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "- [RSS vs QuickJS malloc PNG](${PLOT_BASE}/rss_vs_qjs_scatter.png)" >> "$GITHUB_STEP_SUMMARY"
            echo "- [Overhead stacked PNG](${PLOT_BASE}/overhead_stacked_top.png)" >> "$GITHUB_STEP_SUMMARY"
            echo "- [Phase RSS lines PNG](${PLOT_BASE}/phase_rss_lines_top.png)" >> "$GITHUB_STEP_SUMMARY"
            echo "- [RSS heatmap slice PNG](${PLOT_BASE}/rss_heatmap_slice.png)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "![RSS vs QuickJS malloc](${PLOT_BASE}/rss_vs_qjs_scatter.png)" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "![Overhead stacked chart](${PLOT_BASE}/overhead_stacked_top.png)" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "![Phase RSS lines](${PLOT_BASE}/phase_rss_lines_top.png)" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "![RSS heatmap slice](${PLOT_BASE}/rss_heatmap_slice.png)" >> "$GITHUB_STEP_SUMMARY"
          fi
