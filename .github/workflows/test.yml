name: test

# Runs pytest, ruff, and mypy on the full OS × Python matrix.
# maturin compiles the PyO3 extension from src/lib.rs into a venv
# created per-job; subsequent steps (ruff, mypy, pytest) run from
# that venv so the project's dev extras (ruff, mypy, pytest) are
# on PATH. See spec/implementation.md §5, §10.
#
# Why the venv dance: `maturin develop` refuses to install into a
# bare Python (no VIRTUAL_ENV / CONDA_PREFIX / .venv), which is
# exactly what setup-python gives you. Activating a venv and
# exporting VIRTUAL_ENV + PATH via $GITHUB_ENV makes every later
# step pick it up automatically. Alternative: `maturin build` +
# `pip install dist/*.whl` — less pleasant, needs shell-specific
# glob handling on Windows.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          # Per-OS key so compiled artifacts don't leak across
          # Linux / macOS / Windows caches.
          key: test-${{ matrix.os }}

      - name: Create venv and export to subsequent steps
        shell: bash
        run: |
          python -m venv .venv
          # Windows uses Scripts/, everything else bin/.
          if [ -d ".venv/Scripts" ]; then
            VENV_BIN="$PWD/.venv/Scripts"
          else
            VENV_BIN="$PWD/.venv/bin"
          fi
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
          echo "$VENV_BIN" >> "$GITHUB_PATH"

      - name: Install maturin and dev extras
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install maturin
          # maturin develop builds the extension AND installs the
          # project editable; -E dev adds pytest, mypy, ruff. The
          # venv exported in the prior step is what maturin picks
          # up via VIRTUAL_ENV.
          maturin develop --release -E dev

      - name: ruff
        run: ruff check .

      - name: mypy
        run: mypy quickjs_rs

      - name: pytest
        run: pytest -v
