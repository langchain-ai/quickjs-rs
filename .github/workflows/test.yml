name: test

# Runs pytest, ruff, and mypy on the full OS × Python matrix. maturin
# compiles the PyO3 extension from src/lib.rs before pytest runs;
# there's no separate wasm artifact to download any more.
# See spec/implementation.md §5, §10.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          # Keyed off the lockfile so a dep bump invalidates the cache.
          # Per-OS caches because compiled artifacts aren't portable.
          key: test-${{ matrix.os }}

      - name: Install maturin and dev extras
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install maturin
          # maturin develop builds the extension AND installs the
          # project editable; -E dev adds pytest, mypy, ruff.
          maturin develop --release -E dev

      - name: ruff
        run: ruff check .

      - name: mypy
        run: mypy quickjs_rs

      - name: pytest
        run: pytest -v
