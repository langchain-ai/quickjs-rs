name: test

# Runs pytest, ruff, and mypy on the full OS × Python matrix.
# maturin compiles the PyO3 extension from src/lib.rs into a venv
# created per-job; subsequent steps (ruff, mypy, pytest) run from
# that venv so the project's dev extras (ruff, mypy, pytest) are
# on PATH. See spec/implementation.md §5, §10.
#
# Why the venv dance: `maturin develop` refuses to install into a
# bare Python (no VIRTUAL_ENV / CONDA_PREFIX / .venv marker), which
# is exactly what setup-python gives you. We create .venv and use
# .github/scripts/activate_venv.py to export VIRTUAL_ENV + PATH via
# $GITHUB_ENV / $GITHUB_PATH in host-native form. The helper uses
# pathlib so Windows gets backslash paths and Git-Bash virtual
# paths (/d/a/...) never leak into PowerShell / cmd steps.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
        with:
          # Per-OS key so compiled artifacts don't leak across
          # Linux / macOS / Windows caches.
          key: test-${{ matrix.os }}

      - name: Create venv
        run: python -m venv .venv

      - name: Export venv to subsequent steps (host-native paths)
        # Python writes host-native paths into $GITHUB_ENV /
        # $GITHUB_PATH — bash on Windows would hand back Git-Bash
        # virtual paths (/d/a/...) that later PowerShell/cmd
        # steps can't resolve.
        run: python .github/scripts/activate_venv.py

      - name: Install maturin and dev extras
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install maturin
          # maturin develop builds the extension AND installs the
          # project editable; -E dev adds pytest, mypy, ruff. The
          # venv exported in the prior step is what maturin picks
          # up via VIRTUAL_ENV.
          maturin develop --release -E dev

      - name: ruff
        run: ruff check .

      - name: mypy
        run: mypy quickjs_rs

      - name: pytest
        run: pytest -v
