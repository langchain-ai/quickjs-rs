name: build-wasm

# Builds quickjs.wasm once on Linux and uploads it as a workflow artifact
# so the test matrix can consume a single architecture-independent build.
# See spec/implementation.md §4, §11.3.

on:
  push:
    branches: [main]
    paths:
      - "wasm/**"
      - "vendor/quickjs-ng"
      - ".github/workflows/build-wasm.yml"
  pull_request:
    paths:
      - "wasm/**"
      - "vendor/quickjs-ng"
      - ".github/workflows/build-wasm.yml"
  workflow_call:
    outputs:
      artifact-name:
        description: "Name of the uploaded wasm artifact"
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: quickjs-wasm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install WASI-SDK
        run: ./scripts/install-wasi-sdk.sh

      - name: Install binaryen (wasm-opt)
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen cmake

      - name: Build quickjs.wasm
        run: ./wasm/build.sh

      - name: Verify reproducibility
        run: ./scripts/verify-reproducible.sh

      - uses: actions/upload-artifact@v4
        with:
          name: quickjs-wasm
          path: quickjs_wasm/_resources/quickjs.wasm
          if-no-files-found: error
