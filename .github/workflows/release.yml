name: release

# Manually-triggered release for the quickjs-rs Python package.
#
# Flow: read version from pyproject.toml (the source of truth — no
# version input) → smoke test → build platform wheels + sdist via
# maturin-action → publish to PyPI via trusted publishing → tag the
# release commit `v<version>`.
#
# The git tag is created AFTER PyPI publish succeeds, so a failed
# publish never leaves a phantom tag. Running again after a
# successful publish would fail at the tag-existence check in
# `version-info`.

on:
  workflow_dispatch:
    inputs:
      dangerous-nonmain-release:
        required: false
        type: boolean
        default: false
        description: "Release from a non-main branch (danger!) - only for hotfixes"

permissions:
  contents: read

jobs:
  version-info:
    # Reads the to-be-released version from pyproject.toml and fails fast
    # if a `v<version>` tag already exists. The branch gate on this job
    # cascades to every dependent job via `needs:`.
    if: github.ref == 'refs/heads/main' || inputs.dangerous-nonmain-release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read-version.outputs.version }}
      tag: ${{ steps.read-version.outputs.tag }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # Need the full tag set for the existence check below.
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          # tomllib (used by `shell: python` step below) is stdlib in 3.11+.
          # Pinning shields us from runner-image default-Python changes.
          python-version: "3.12"

      - name: Read version from pyproject.toml
        id: read-version
        shell: python
        run: |
          import os
          import tomllib
          with open("pyproject.toml", "rb") as f:
              version = tomllib.load(f)["project"]["version"]
          tag = f"v{version}"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={version}\n")
              f.write(f"tag={tag}\n")

      - name: Fail if tag already exists
        run: |
          TAG="${{ steps.read-version.outputs.tag }}"
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Bump pyproject.toml before re-running."
            exit 1
          fi
          echo "Tag $TAG does not exist — OK to proceed."

  pre-release-checks:
    # Release-time smoke test on the exact commit being shipped. The
    # full 3-OS x 3-Python matrix runs on every PR/main push via
    # test.yml — this job is the final-mile sanity check, not a CI
    # re-run, so it covers a single (ubuntu, py3.12) cell.
    needs: version-info
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
        with:
          key: release-prechecks

      - name: Create venv
        run: python -m venv .venv

      - name: Export venv to subsequent steps (host-native paths)
        # See test.yml for why this dance is needed (maturin develop
        # refuses to install into a bare Python; the helper exports
        # VIRTUAL_ENV + PATH in host-native form so later steps work
        # under bash on Windows too — irrelevant here, but kept for
        # parity with test.yml).
        run: python .github/scripts/activate_venv.py

      - name: Install maturin and dev extras
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install maturin
          maturin develop --release -E dev

      - name: ruff
        run: ruff check .

      - name: mypy
        run: mypy quickjs_rs

      - name: pytest
        run: pytest -v

  linux:
    needs: version-info
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheels (manylinux)
        uses: PyO3/maturin-action@3e2bdf6ba6453a61e649744019b8a2d906c7eb38 # v1.51.0
        with:
          target: ${{ matrix.target }}
          # -i targets a single Python version so each matrix cell produces
          # exactly one wheel; maturin otherwise picks up every Python on PATH
          # inside the build container.
          args: --release --out dist -i python${{ matrix.python-version }}
          manylinux: auto
          # Force C11 for the bundled QuickJS source compiled by rquickjs-sys's
          # build.rs. The aarch64 cross-container
          # (ghcr.io/rust-cross/manylinux2014-cross:aarch64) ships a gcc that
          # defaults to pre-C99 mode and rejects
          # variable-declaration-in-for-loop syntax — `for (int i=...;)` errors
          # as "'for' loop initial declarations are only allowed in C99 mode".
          # x86_64's PyPA image (quay.io/pypa/manylinux2014_x86_64:latest) has a
          # newer devtoolset gcc that defaults to gnu11, which is why x86_64
          # alone was green before this flag. We set the flag for all Linux
          # targets rather than just aarch64 so the flag stops being
          # load-bearing the moment rust-cross updates its image.
          #
          # cc-rs (invoked by rquickjs-sys's build.rs) respects CFLAGS;
          # maturin-action forwards docker-options to `docker run`, so `-e
          # CFLAGS=-std=gnu11` lands inside the build container.
          #
          # Note: the input is `docker-options`, NOT `container-options`. GitHub
          # Actions silently ignores unknown inputs — earlier attempts used
          # `container-options` and cc-rs reported `CFLAGS = None` (the var
          # never reached the container) while the step log showed the input as
          # configured. Lesson: after any change to workflow inputs, inspect the
          # `docker run` command line in the job log to confirm the flag is
          # actually present, not just that the step didn't error.
          docker-options: -e CFLAGS=-std=gnu11

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-linux-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist

  macos:
    needs: version-info
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheels (macOS)
        uses: PyO3/maturin-action@3e2bdf6ba6453a61e649744019b8a2d906c7eb38 # v1.51.0
        with:
          target: ${{ matrix.target }}
          # -i targets a single Python version so each matrix cell produces
          # exactly one wheel; maturin otherwise picks up every Python on PATH
          # inside the build container.
          args: --release --out dist -i python${{ matrix.python-version }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-macos-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist

  windows:
    needs: version-info
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheels (Windows)
        uses: PyO3/maturin-action@3e2bdf6ba6453a61e649744019b8a2d906c7eb38 # v1.51.0
        with:
          # -i targets a single Python version so each matrix cell produces
          # exactly one wheel; maturin otherwise picks up every Python on PATH
          # inside the build container.
          args: --release --out dist -i python${{ matrix.python-version }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-windows-py${{ matrix.python-version }}
          path: dist

  sdist:
    needs: version-info
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Build sdist
        uses: PyO3/maturin-action@3e2bdf6ba6453a61e649744019b8a2d906c7eb38 # v1.51.0
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    needs: [version-info, pre-release-checks, linux, macos, windows, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          # All upload-artifact names above start with `wheels-`;
          # merge into a single dist/ directory.
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  tag-release:
    # Create the git tag + GitHub Release only after PyPI publish
    # succeeds, so a failed publish never leaves a phantom tag.
    needs: [version-info, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create the tag/release
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Create tag and GitHub Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          tag: ${{ needs.version-info.outputs.tag }}
          commit: ${{ github.sha }}
          artifacts: "dist/*"
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
