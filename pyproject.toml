[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "quickjs-rs"
version = "0.3.0.dev0"
description = "Sandboxed JavaScript execution for Python, via PyO3 + rquickjs."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [
    { name = "LangChain" },
]
keywords = ["quickjs", "javascript", "sandbox", "pyo3", "rust"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Interpreters",
]
dependencies = [
    "wasmtime>=27.0.0",
    "msgpack>=1.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov",
    "pytest-asyncio>=0.23",
    "ruff",
    "mypy",
]
bench = [
    "pytest-codspeed>=3.0",
]

[project.urls]
Homepage = "https://github.com/langchain-ai/quickjs-rs"
Issues = "https://github.com/langchain-ai/quickjs-rs/issues"

[tool.setuptools.packages.find]
include = ["quickjs_rs*"]

[tool.setuptools.package-data]
quickjs_rs = ["py.typed", "_resources/quickjs.wasm"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "W"]

[tool.mypy]
python_version = "3.11"
strict = true
files = ["quickjs_rs"]

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = ["error::ResourceWarning"]
asyncio_mode = "auto"
# Collect both test_ (correctness) and bench_ (benchmark) functions.
# Filenames stay `test_*.py` per spec/benchmarks.md §3; function
# names use `bench_` per CLAUDE.md "Benchmark naming" to visually
# distinguish benchmarks from correctness tests. Benchmarks live
# in benchmarks/ (outside testpaths); tests/ has no bench_
# functions, so the expanded pattern doesn't change correctness-
# test collection.
python_functions = ["test_*", "bench_*"]
